name: Release Helm Charts

on:
  push:
    branches:
      - main
    # paths:
    #   - 'helm/**'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Create gh-pages branch if it doesn't exist
        run: |
          if ! git ls-remote --exit-code origin gh-pages; then
            git checkout --orphan gh-pages
            git rm -rf .
            git commit --allow-empty -m "Initialize gh-pages branch"
            git push origin gh-pages
            git checkout main
          fi

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Resolve subchart dependencies
        run: |
          helm dependency update ./helm/kafka-kraft
          helm dependency update ./helm/ckan
          helm dependency update ./helm/ndp-jupyterhub
          helm dependency update ./helm

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.6.0
        with:
          # chart-releaser looks for Chart.yaml one level deep under charts_dir,
          # so it will find scidx-helm/Chart.yaml and package the umbrella chart.
          charts_dir: .
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
